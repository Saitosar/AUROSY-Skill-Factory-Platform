[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aurosy-motion-capture"
version = "0.1.0"
description = "Motion capture service for AUROSY Skill Factory"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.109.0",
  "uvicorn[standard]>=0.27.0",
  "websockets>=12.0",
  "mediapipe>=0.10.9",
  "numpy>=1.24.0",
  "opencv-python>=4.8.0",
  "certifi>=2024.2.2",
]

[project.optional-dependencies]
vitpose = ["mmpose>=1.3.0", "mmcv>=2.1.0", "torch>=2.0.0"]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0", "httpx>=0.27.0"]

[project.scripts]
motion-capture-server = "motion_capture.server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["motion_capture", "motion_capture.*"]

